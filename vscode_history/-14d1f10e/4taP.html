<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="stylesheet" href="app.css">

<meta charset="UTF-8">
<title>Formulaire notes modules</title>
</head>
<body>
<script src="app.js"></script>


<h2>Formulaire notes par module</h2>

<p>Note finale souhaitée (%): <input type="number" name="noteFinale" placeholder="ex: 60"></p>

      <td><input type="number" name="coef1" value="1"></td>

      <td><input type="number" name="efm1" placeholder="EFM"></td>
    </tr>
    <tr>
      <td>Module 2</td>
      <td><input type="number" name="coef2" value="1"></td>

    <tr>
      <td>Module 3</td>
      <td><input type="number" name="coef3" value="1"></td>
      <td><input type="number" name="cc3" placeholder="CC"></td>
      <td><input type="number" name="efm3" placeholder="EFM"></td>
    </tr>
    <tr>
      <td>Module 4</td>
      <td><input type="number" name="coef4" value="1"></td>
      <td><input type="number" name="cc4" placeholder="CC"></td>
      <td><input type="number" name="efm4" placeholder="EFM"></td>
    </tr>
    <tr>
      <td>Module 5</td>
      <td><input type="number" name="coef5" value="1"></td>

    </tr>
    <tr>
      <td>Module 6</td>
      <td><input type="number" name="coef6" value="1"></td>
      <td><input type="number" name="cc6" placeholder="CC"></td>
      <td><input type="number" name="efm6" placeholder="EFM"></td>
    </tr>
    <tr>
      <td>Module 7</td>
      <td><input type="number" name="coef7" value="1"></td>
      <td><input type="number" name="cc7" placeholder="CC"></td>
      <td><input type="number" name="efm7" placeholder="EFM"></td>
    </tr>
    <tr>
      <td>Module 8</td>
      <td><input type="number" name="coef8" value="1"></td>
      <td><input type="number" name="cc8" placeholder="CC"></td>
      <td><input type="number" name="efm8" placeholder="EFM"></td>
    </tr>
  </tbody>
</table>

<p>Faites le calcul à la main ou avec une calculatrice.</p>
