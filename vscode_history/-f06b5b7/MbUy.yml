version: '3.9'

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:

services:
  postgres:
    image: postgres:15
    container_name: tp_postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: tp_rabbitmq
    restart: unless-stopped
    env_file: .env
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth:
    build: ./services/auth
    container_name: tp_auth
    restart: unless-stopped
    env_file: .env
    networks:
      - app-network

  api:
    build: ./services/api
    container_name: tp_api
    restart: unless-stopped
    env_file: .env
    networks:
      - app-network

  frontend:
    build: ./services/frontend
    container_name: tp_frontend
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:1.25-alpine
    container_name: tp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network