worker_processes 1;

events { 
    worker_connections 1024; 
}

http {
    # 1. Load Balancing pour le Service Commandes (2 instances)
    # On imagine qu'on va lancer l'Order Service sur 4000 et 4001
    upstream order_service {
        server host.docker.internal:4000;
        server host.docker.internal:4001; 
    }

    upstream user_service {
        server host.docker.internal:3001;
    }

    upstream product_service {
        server host.docker.internal:5000;
    }

    upstream notification_service {
        server host.docker.internal:3004;
    }

    server {
        listen 80;
        server_name localhost;

        # 2. Configuration des Headers CORS (Obligatoire)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # 3. Routage vers les Microservices

        # Service Utilisateurs
        location /api/users/ {
            proxy_pass http://user_service;
        }

        # Service Produits
        location /api/products/ {
            proxy_pass http://product_service;
        }

        # Service Commandes (Load Balanced)
        location /api/orders/ {
            proxy_pass http://order_service;
        }

        # Service Notifications
        location /api/notifications/ {
            proxy_pass http://notification_service;
        }
    }
}